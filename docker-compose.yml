services:
  backend:
    build: ./backend
    container_name: videogen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./backend/cache:/app/cache
      - ./.env:/app/.env
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: videogen-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    container_name: videogen-telegram-bot
    command: ["python", "telegram_bot.py"]
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  output:
  cache:
