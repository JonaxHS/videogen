services:
  backend:
    build: ./backend
    container_name: videogen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./backend/cache:/app/cache
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    restart: unless-stopped
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    memswap_limit: 1G

  frontend:
    build: ./frontend
    container_name: videogen-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    container_name: videogen-telegram-bot
    command: ["python", "telegram_bot.py"]
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - backend
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: videogen-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  output:
  cache:
  ollama:
